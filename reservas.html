<form id="reservaForm" action="https://api.web3forms.com/submit" method="POST">
  <input type="hidden" name="access_key" value="d57f4019-573c-4525-a32b-8e3a922f9f63">
  
  <input type="hidden" name="subject" value="🍽️ Nueva reserva — Mesón Navarro">
  
  <input type="checkbox" name="botcheck" class="hidden" style="display: none;">

  <div class="row g-3">
    <div class="col-md-6">
      <label class="form-label">Nombre *</label>
      <input type="text" class="form-control" name="nombre" placeholder="Tu nombre" required>
    </div>
    <div class="col-md-6">
      <label class="form-label">Teléfono *</label>
      <input type="tel" class="form-control" name="telefono" placeholder="6xx xxx xxx" required>
    </div>
    <div class="col-md-6">
      <label class="form-label">Email (para confirmarte la reserva)</label>
      <input type="email" class="form-control" name="email" placeholder="correo@ejemplo.com">
    </div>
    <div class="col-md-6">
      <label class="form-label">Comensales *</label>
      <select class="form-select" name="comensales" required>
        <option value="">— Selecciona —</option>
        <option>1</option><option>2</option><option>3</option>
        <option>4</option><option>5</option><option>6</option>
        <option>7</option><option>8</option><option value="Más de 8">Más de 8</option>
      </select>
    </div>
    <div class="col-md-6">
      <label class="form-label">Fecha *</label>
      <input type="date" class="form-control" name="fecha" required>
    </div>
    <div class="col-md-6">
      <label class="form-label">Hora *</label>
      <select class="form-select" name="hora" required>
        <option value="">— Selecciona —</option>
        <optgroup label="Mediodía (12:30 – 16:30)">
          <option>12:30</option><option>13:00</option><option>13:30</option>
          <option>14:00</option><option>14:30</option><option>15:00</option>
          <option>15:30</option><option>16:00</option>
        </optgroup>
        <optgroup label="Noche (20:00 – 00:00)">
          <option>20:00</option><option>20:30</option><option>21:00</option>
          <option>21:30</option><option>22:00</option><option>22:30</option>
        </optgroup>
      </select>
    </div>
    <div class="col-12">
      <label class="form-label">Mensaje o petición especial</label>
      <textarea class="form-control" name="mensaje" rows="3" placeholder="Alergias, celebraciones, preferencias de mesa…"></textarea>
    </div>
    <div class="col-12">
      <button type="submit" class="btn btn-personalizado w-100">
        <i class="bi bi-check-circle me-2"></i>Confirmar reserva
      </button>
    </div>
  </div>
</form>
